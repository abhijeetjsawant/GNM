name: Linux

on:
  push:
    branches: [main, master]
    paths:
      - 'gnm/shape/**'
      - 'copy.bara.sky'
      - '.github/workflows/**'
  pull_request:
    branches: [main, master]
    paths:
      - 'gnm/shape/**'
      - 'copy.bara.sky'
      - '.github/workflows/**'
  schedule:
    # Run weekly on Sundays at 00:00 UTC to catch regressions caused by upstream dependency updates
    - cron: '0 0 * * 0'
  workflow_dispatch:

# Restrict default permissions of GITHUB_TOKEN to read-only for repository contents.
permissions:
  contents: read

# Concurrency group ensures that only one workflow run per branch/PR is active at a time.
# If a new commit is pushed, any running job for that PR/branch is cancelled.
concurrency:
  group: ci-linux-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  linux-test:
    name: linux-test
    runs-on: ubuntu-latest
    timeout-minutes: 60

    defaults:
      run:
        shell: bash -e {0}

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # ratchet:actions/checkout@v7.0.0
        with:
          lfs: true # Ensure Git LFS assets (like model files/weights) are fully downloaded

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install gnm-shape package (Editable Mode with all framework extras and dev dependencies)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "./gnm/shape[all,dev]"

      - name: Run unit tests
        run: |
          python gnm/shape/run_all_tests.py

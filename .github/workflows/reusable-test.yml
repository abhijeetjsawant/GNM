name: Run Tests Template

on:
  workflow_call:
    inputs:
      os:
        required: true
        type: string

jobs:
  test:
    name: Test (${{ inputs.os }})
    runs-on: ${{ inputs.os }}
    timeout-minutes: 60

    # Use bash login shell to enable micromamba environment activation
    defaults:
      run:
        shell: bash -el {0}

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # ratchet:actions/checkout@v7.0.0
        with:
          lfs: true # Ensure Git LFS assets (like model files/weights) are fully downloaded

      # Setup Micromamba to install dependencies from environment.yml.
      # This handles binary dependencies (like rtree, opencv, etc.) robustly across OSes.
      - name: Setup Micromamba
        uses: mamba-org/setup-micromamba@d7c9bd84e824b79d2af72a2d4196c7f4300d3476 # ratchet:mamba-org/setup-micromamba@v3
        with:
          environment-file: gnm/shape/environment.yml
          environment-name: gnm
          cache-environment: true
          init-shell: bash

      - name: Install package (Editable Mode)
        run: |
          cd gnm/shape
          pip install --no-deps -e .

      - name: Run unit tests
        run: |
          cd gnm/shape
          python run_all_tests.py
